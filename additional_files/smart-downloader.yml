name: Rubika Cloud Uploader

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Direct Link to download'
        required: true
      folder_name:
        description: 'Folder name from OctoFetch'
        required: false
        default: 'downloads'
      safe_mode:
        description: 'Safe mode from OctoFetch'
        required: false
        default: 'false'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install rubpy

      - name: Download File
        run: |
          mkdir -p downloads/parts
          # دانلود فایل با نام اصلی
          curl -L "${{ github.event.inputs.file_url }}" -o "downloads/main_file"

      - name: Split File (1.9GB Chunks)
        run: |
          # تقسیم فایل به قطعات 1900 مگابایتی برای رعایت محدودیت 2 گیگ روبیکا
          split -b 1900M -d "downloads/main_file" "downloads/parts/part_"
          # حذف فایل اصلی برای خالی شدن فضا
          rm "downloads/main_file"

      - name: Restore Rubika Session
        run: |
          # تبدیل کد Base64 ذخیره شده در Secrets به فایل سشن واقعی
          echo "${{ secrets.SESSION_FILE_BASE64 }}" | base64 -d > user_session.rp

      - name: Run Uploader
        run: python rubika_uploader.py
